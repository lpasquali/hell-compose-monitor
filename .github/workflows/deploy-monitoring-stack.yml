name: Deploy Monitoring Stack

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development
      action:
        description: 'Deployment action'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - restart
          - stop
          - status
      force_recreate:
        description: 'Force recreate containers'
        required: false
        default: false
        type: boolean

env:
  COMPOSE_PROJECT_NAME: hell-compose-monitor-${{ github.event.inputs.environment }}
  COMPOSE_FILE: docker-compose.yml

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: self-hosted
    timeout-minutes: 30
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Verify prerequisites
        run: |
          echo "=== Verifying prerequisites ==="
          
          # Check Docker
          if ! command -v docker &> /dev/null; then
            echo "❌ Docker is not installed"
            exit 1
          fi
          echo "✓ Docker version: $(docker --version)"
          
          # Check Docker Compose
          if ! docker compose version &> /dev/null; then
            echo "❌ Docker Compose V2 is not installed"
            exit 1
          fi
          echo "✓ Docker Compose version: $(docker compose version)"
          
          # Check disk space
          available_gb=$(df -BG . | tail -1 | awk '{print $4}' | sed 's/G//')
          if [ "$available_gb" -lt 20 ]; then
            echo "⚠ Warning: Low disk space (${available_gb}GB available, 20GB+ recommended)"
          else
            echo "✓ Disk space: ${available_gb}GB available"
          fi
          
          # Check if .env file exists
          if [ ! -f .env ]; then
            echo "⚠ Warning: .env file not found, will need to be created"
          else
            echo "✓ .env file exists"
          fi

      - name: Setup environment file
        run: |
          echo "=== Setting up environment file ==="
          
          if [ ! -f .env ]; then
            echo "Creating .env from .env-sample..."
            cp .env-sample .env
            echo "⚠ Please update .env with actual credentials before deploying to production!"
          fi
          
          # Validate required environment variables
          if [ -f .env ]; then
            echo "Checking required environment variables..."
            required_vars=("EXTERNAL_URL" "PVE_USER" "PVE_PASSWORD")
            missing=0
            
            for var in "${required_vars[@]}"; do
              if ! grep -q "^${var}=" .env || grep -q "^${var}=xxx" .env; then
                echo "⚠ ${var} needs to be configured"
                missing=1
              fi
            done
            
            if [ $missing -eq 1 ] && [ "${{ github.event.inputs.environment }}" = "production" ]; then
              echo "❌ Missing required environment variables for production deployment"
              exit 1
            fi
          fi

      - name: Pull latest images
        if: github.event.inputs.action == 'deploy' || github.event.inputs.action == 'restart'
        run: |
          echo "=== Pulling latest Docker images ==="
          docker compose pull
          echo "✓ Images pulled successfully"

      - name: Stop existing stack (if running)
        if: github.event.inputs.action == 'deploy' || github.event.inputs.action == 'restart' || github.event.inputs.action == 'stop'
        run: |
          echo "=== Stopping existing stack ==="
          if docker compose ps --quiet | grep -q .; then
            docker compose down
            echo "✓ Existing stack stopped"
          else
            echo "ℹ No running stack found"
          fi

      - name: Start monitoring stack
        if: github.event.inputs.action == 'deploy' || github.event.inputs.action == 'restart'
        run: |
          echo "=== Starting monitoring stack ==="
          
          # Determine compose command flags
          FLAGS=""
          if [ "${{ github.event.inputs.force_recreate }}" = "true" ]; then
            FLAGS="--force-recreate"
            echo "Force recreate enabled"
          fi
          
          # Start services
          docker compose up -d $FLAGS
          
          echo "✓ Monitoring stack started"
          echo ""
          echo "=== Running services ==="
          docker compose ps

      - name: Wait for services to be healthy
        if: github.event.inputs.action == 'deploy' || github.event.inputs.action == 'restart'
        run: |
          echo "=== Waiting for services to become healthy ==="
          
          # Function to check service health
          check_health() {
            local service=$1
            local max_attempts=60
            local attempt=1
            
            echo "Checking $service..."
            while [ $attempt -le $max_attempts ]; do
              status=$(docker compose ps $service --format json 2>/dev/null | jq -r '.[0].Health // "unknown"' 2>/dev/null || echo "unknown")
              
              if [ "$status" = "healthy" ]; then
                echo "✓ $service is healthy"
                return 0
              fi
              
              if [ $((attempt % 10)) -eq 0 ]; then
                echo "  Still waiting for $service... (attempt $attempt/$max_attempts, status: $status)"
              fi
              
              sleep 5
              attempt=$((attempt + 1))
            done
            
            echo "⚠ $service did not become healthy within timeout (last status: $status)"
            return 1
          }
          
          # Wait for critical services
          echo "Waiting for critical services to be healthy..."
          failed=0
          
          check_health prometheus || failed=1
          check_health alertmanager || failed=1
          check_health grafana || failed=1
          check_health loki || failed=1
          check_health promtail || failed=1
          
          if [ $failed -eq 1 ]; then
            echo ""
            echo "⚠ Some services failed health checks, but deployment continued"
            echo "Check service logs: docker compose logs <service>"
          else
            echo ""
            echo "✓ All critical services are healthy"
          fi

      - name: Verify deployment
        if: github.event.inputs.action == 'deploy' || github.event.inputs.action == 'restart' || github.event.inputs.action == 'status'
        run: |
          echo "=== Deployment verification ==="
          
          # Get service status
          echo ""
          echo "Service Status:"
          docker compose ps --format "table {{.Name}}\t{{.Status}}\t{{.Health}}"
          
          # Check endpoints
          echo ""
          echo "Endpoint checks:"
          
          # Prometheus
          if curl -sf http://localhost:9090/-/healthy > /dev/null 2>&1; then
            echo "✓ Prometheus: http://localhost:9090"
          else
            echo "⚠ Prometheus: Not responding at http://localhost:9090"
          fi
          
          # Grafana
          if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
            echo "✓ Grafana: http://localhost:3000"
          else
            echo "⚠ Grafana: Not responding at http://localhost:3000"
          fi
          
          # Alertmanager
          if curl -sf http://localhost:9093/api/v2/status > /dev/null 2>&1; then
            echo "✓ Alertmanager: http://localhost:9093"
          else
            echo "⚠ Alertmanager: Not responding at http://localhost:9093"
          fi
          
          # Loki
          if curl -sf http://localhost:3100/ready > /dev/null 2>&1; then
            echo "✓ Loki: http://localhost:3100"
          else
            echo "⚠ Loki: Not responding at http://localhost:3100"
          fi

      - name: Display resource usage
        if: github.event.inputs.action == 'deploy' || github.event.inputs.action == 'restart' || github.event.inputs.action == 'status'
        run: |
          echo ""
          echo "=== Resource Usage ==="
          docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.MemPerc}}\t{{.NetIO}}\t{{.BlockIO}}"

      - name: Show access information
        if: github.event.inputs.action == 'deploy' || github.event.inputs.action == 'restart'
        run: |
          echo ""
          echo "=== Access Information ==="
          echo ""
          echo "📊 Monitoring Stack Deployed Successfully!"
          echo ""
          echo "Access the following services:"
          echo "  • Prometheus:    http://$(hostname -I | awk '{print $1}'):9090"
          echo "  • Grafana:       http://$(hostname -I | awk '{print $1}'):3000"
          echo "  • Alertmanager:  http://$(hostname -I | awk '{print $1}'):9093"
          echo ""
          echo "Default Grafana credentials:"
          echo "  Username: admin"
          echo "  Password: admin (change on first login)"
          echo ""
          echo "Useful commands:"
          echo "  • View logs:      docker compose logs -f [service]"
          echo "  • Restart:        docker compose restart [service]"
          echo "  • Stop all:       docker compose down"
          echo "  • Status:         docker compose ps"
          echo ""

      - name: Post-deployment checks
        if: github.event.inputs.action == 'deploy' || github.event.inputs.action == 'restart'
        run: |
          echo "=== Post-deployment checks ==="
          
          # Check for errors in logs
          echo "Checking recent logs for errors..."
          if docker compose logs --tail=50 | grep -i "fatal\|panic" | grep -v "level=error"; then
            echo "⚠ Found critical errors in logs (review above)"
          else
            echo "✓ No critical errors in recent logs"
          fi
          
          # Verify data persistence
          echo ""
          echo "Checking data volumes..."
          docker volume ls | grep "${COMPOSE_PROJECT_NAME}" || echo "No named volumes found"
          
          # Check network
          echo ""
          echo "Checking networks..."
          docker network ls | grep "${COMPOSE_PROJECT_NAME}"

      - name: Create deployment summary
        if: always()
        run: |
          echo "=== Deployment Summary ===" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Action:** ${{ github.event.inputs.action }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.event.inputs.action }}" != "stop" ]; then
            echo "### Services Status" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            docker compose ps --format "table {{.Name}}\t{{.Status}}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo ""
          echo "Recent logs from all services:"
          docker compose logs --tail=100
          echo ""
          echo "To troubleshoot:"
          echo "  1. Check service logs: docker compose logs <service>"
          echo "  2. Check service status: docker compose ps"
          echo "  3. Check .env configuration"
          echo "  4. Check available resources (disk, memory)"

  backup:
    name: Backup volumes before deployment
    runs-on: self-hosted
    if: github.event.inputs.action == 'deploy' && github.event.inputs.environment == 'production'
    timeout-minutes: 15

    steps:
      - name: Create backup directory
        run: |
          BACKUP_DIR="/var/backups/hell-compose-monitor/$(date +%Y%m%d_%H%M%S)"
          mkdir -p "$BACKUP_DIR"
          echo "BACKUP_DIR=$BACKUP_DIR" >> $GITHUB_ENV
          echo "Created backup directory: $BACKUP_DIR"

      - name: Backup Prometheus data
        continue-on-error: true
        run: |
          echo "=== Backing up Prometheus data ==="
          if docker volume ls | grep -q "prometheus_data"; then
            docker run --rm \
              -v hell-compose-monitor-production_prometheus_data:/data:ro \
              -v $BACKUP_DIR:/backup \
              alpine tar czf /backup/prometheus_data.tar.gz -C /data .
            echo "✓ Prometheus data backed up"
          else
            echo "ℹ Prometheus volume not found, skipping"
          fi

      - name: Backup Grafana data
        continue-on-error: true
        run: |
          echo "=== Backing up Grafana data ==="
          if docker volume ls | grep -q "grafana_data"; then
            docker run --rm \
              -v hell-compose-monitor-production_grafana_data:/data:ro \
              -v $BACKUP_DIR:/backup \
              alpine tar czf /backup/grafana_data.tar.gz -C /data .
            echo "✓ Grafana data backed up"
          else
            echo "ℹ Grafana volume not found, skipping"
          fi

      - name: Backup summary
        run: |
          echo "=== Backup Summary ==="
          echo "Backup location: $BACKUP_DIR"
          ls -lh "$BACKUP_DIR"
          echo ""
          echo "To restore from backup:"
          echo "  docker run --rm -v <volume>:/data -v $BACKUP_DIR:/backup alpine tar xzf /backup/<file>.tar.gz -C /data"
